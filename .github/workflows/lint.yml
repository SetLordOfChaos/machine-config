name: Lint

permissions:
  contents: read
  id-token: write

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v16

      - name: Enable Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@v8

      - name: Install lint tools
        run: |
          nix profile add nixpkgs#shellcheck nixpkgs#alejandra nixpkgs#statix

      - name: Run shellcheck
        run: |
          find scripts -type f -name '*.sh' -print0 2>/dev/null | xargs -0 -r shellcheck

      - name: Check Nix formatting
        run: |
          alejandra --check .

      - name: Run statix
        run: |
          statix check .